<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活メモ一括管理ツール【完全版】</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
            --border-color: #cbd5e1;
            --active-tab-bg: #3b82f6;
            --success-color: #10b981;
            --success-hover: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 全体レイアウト */
        .sidebar {
            width: 280px;
            background-color: #1e293b;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 左サイドバー：大分類タブ */
        .sidebar-header {
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #0f172a;
            border-bottom: 1px solid #334155;
        }
        .main-tabs {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px;
        }
        .main-tab-btn {
            background: none;
            border: none;
            color: #94a3b8;
            padding: 12px 16px;
            text-align: left;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .main-tab-btn:hover { background-color: #334155; color: white; }
        .main-tab-btn.active { background-color: var(--primary-color); color: white; }

        /* サブカテゴリ管理エリア */
        .sub-category-section {
            padding: 12px;
            border-top: 1px solid #334155;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sub-category-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .sub-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
        }
        
        /* 企業名・業界名の行レイアウト */
        .sub-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            border-radius: 4px;
        }
        .sub-item-row:hover { background-color: #334155; }
        
        .sub-item-btn {
            background: none;
            border: none;
            color: #cbd5e1;
            padding: 8px 12px;
            text-align: left;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        .sub-item-btn.active { font-weight: bold; color: white; }
        .sub-item-row.active { background-color: #475569; }

        .sub-delete-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .sub-delete-btn:hover { background-color: #ef4444; color: white; }

        /* ゴミ箱（復元）エリア */
        .trash-section {
            margin-top: auto;
            border-top: 1px dashed #475569;
            padding-top: 12px;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .trash-item-btn {
            background: none;
            border: none;
            color: #94a3b8;
            padding: 6px 8px;
            text-align: left;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        .trash-item-btn:hover { background-color: #1e293b; color: #3b82f6; }

        .add-input-group {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .add-input-group input {
            flex: 1;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #475569;
            background-color: #334155;
            color: white;
            font-size: 12px;
        }
        .add-input-group button {
            padding: 6px 10px;
            background-color: #475569;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .add-input-group button:hover { background-color: #64748b; }

        /* ★ バックアップ操作エリア（サイドバー最下部） */
        .backup-section {
            padding: 16px 12px;
            background-color: #0f172a;
            border-top: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .backup-title {
            font-size: 11px;
            color: #94a3b8;
            font-weight: bold;
            text-align: center;
        }
        .backup-btn-group {
            display: flex;
            gap: 6px;
        }
        .btn-backup {
            flex: 1;
            padding: 6px;
            font-size: 11px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            color: white;
        }
        .btn-export { background-color: #4b5563; }
        .btn-export:hover { background-color: #374151; }
        .btn-import { background-color: #0d9488; }
        .btn-import:hover { background-color: #0f766e; }

        /* メインコンテンツヘッダー */
        .content-header {
            background-color: white;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .current-path { font-size: 18px; font-weight: bold; }
        .sub-tabs-container {
            background-color: #f8fafc;
            padding: 8px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }
        .sub-tab-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background-color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .sub-tab-btn.active {
            background-color: #e0f2fe;
            border-color: #7dd3fc;
            color: #0369a1;
            font-weight: bold;
        }

        /* ワークスペース */
        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .memo-list-pane {
            width: 350px;
            border-right: 1px solid var(--border-color);
            background-color: white;
            display: flex;
            flex-direction: column;
        }
        .pane-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .memo-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        /* メモカード（ドラッグ移動対応） */
        .memo-card {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: grab;
            background-color: white;
            transition: background-color 0.2s, border-color 0.2s;
            user-select: none;
        }
        .memo-card:active { cursor: grabbing; }
        .memo-card:hover { background-color: #f8fafc; }
        .memo-card.active { border-color: var(--primary-color); background-color: #eff6ff; }
        .memo-card-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .memo-card-title::after { content: '☰'; color: #cbd5e1; font-size: 12px; }
        .memo-card-date { font-size: 11px; color: #64748b; }
        
        .memo-card.dragging { opacity: 0.4; border: 2px dashed var(--primary-color); }

        .memo-detail-pane {
            flex: 1;
            background-color: white;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        /* フォーム要素 */
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; font-weight: bold; color: #475569; }
        .form-group input[type="text"], .form-group textarea {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; outline: none;
        }
        .form-group textarea { height: 200px; resize: vertical; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }

        /* 画像編集機能 */
        .image-preview-area {
            margin-top: 12px;
            border: 1px dashed var(--border-color);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            background-color: #f8fafc;
        }
        .preview-img { max-width: 100%; height: auto; display: block; margin: 10px auto; border-radius: 4px; }
        .size-control { display: flex; align-items: center; gap: 12px; margin-top: 8px; font-size: 13px; }

        .btn {
            padding: 10px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: #ef4444; color: white; }
        .btn-danger:hover { background-color: #dc2626; }
        
        .action-bar { display: flex; justify-content: space-between; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">就活メモ管理</div>
        <div class="main-tabs">
            <button class="main-tab-btn active" onclick="switchMainTab('self')">自己分析</button>
            <button class="main-tab-btn" onclick="switchMainTab('industry')">業界研究</button>
            <button class="main-tab-btn" onclick="switchMainTab('company')">企業情報</button>
        </div>

        <div class="sub-category-section" id="subCategorySection" style="display:none;">
            <div id="subCategoryTitle" class="sub-category-title">サブカテゴリ</div>
            <div id="subList" class="sub-list"></div>
            
            <div class="add-input-group">
                <input type="text" id="newSubInput" placeholder="新規追加...">
                <button onclick="addSubCategory()">追加</button>
            </div>

            <div class="trash-section" id="trashSection" style="display:none;"></div>
        </div>

        <div class="backup-section">
            <div class="backup-title">データの安全管理</div>
            <div class="backup-btn-group">
                <button class="btn-backup btn-export" onclick="exportData()" title="全データをファイルとしてダウンロードします">📥 保存</button>
                <button class="btn-backup btn-import" onclick="triggerImport()" title="バックアップファイルを読み込みます">📤 復元</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="importData(event)">
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <div class="current-path" id="currentPath">自己分析</div>
        </div>

        <div class="sub-tabs-container" id="companySubTabs" style="display:none;">
            <button class="sub-tab-btn active" onclick="switchCompanySubTab('マイページ情報')">マイページ情報</button>
            <button class="sub-tab-btn" onclick="switchCompanySubTab('ES管理')">ES管理</button>
            <button class="sub-tab-btn" onclick="switchCompanySubTab('面接管理')">面接管理</button>
            <button class="sub-tab-btn" onclick="switchCompanySubTab('企業研究')">企業研究</button>
        </div>

        <div class="workspace">
            <div class="memo-list-pane">
                <div class="pane-header">
                    <h3>メモ一覧 <span style="font-size:11px; font-weight:normal; color:#64748b;">(ドラッグで並び替え)</span></h3>
                    <button class="btn btn-primary" style="padding:4px 8px; font-size:12px;" onclick="createNewMemo()">＋ 新規メモ</button>
                </div>
                <div class="memo-scroll" id="memoList"></div>
            </div>

            <div class="memo-detail-pane" id="memoDetailPane">
                <div id="editorEmptyState" style="text-align:center; color:#94a3b8; margin-top:100px;">
                    メモを選択するか、新規作成してください。
                </div>
                <form id="memoForm" style="display:none;" onsubmit="saveMemo(event)">
                    <div class="form-group">
                        <label for="memoTitle">タイトル</label>
                        <input type="text" id="memoTitle" required placeholder="例: 自己PRのブラッシュアップ">
                    </div>
                    <div class="form-group">
                        <label for="memoContent">内容</label>
                        <textarea id="memoContent" placeholder="ここに詳細を記録します..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>画像の添付</label>
                        <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                        <div class="image-preview-area" id="imagePreviewArea" style="display:none;">
                            <span style="font-size:12px; color:#64748b;">プレビュー</span>
                            <img id="previewImg" class="preview-img" src="" alt="添付画像">
                            <div class="size-control">
                                <label for="imageSizeSlider">画像の幅調整:</label>
                                <input type="range" id="imageSizeSlider" min="100" max="800" value="300" oninput="resizeImage(this.value)">
                                <span id="sizeDisplay">300px</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>作成日時</label>
                            <input type="text" id="createdAtDisplay" readonly style="background-color:#f1f5f9; color:#64748b;">
                        </div>
                        <div class="form-group">
                            <label>最終編集日時</label>
                            <input type="text" id="updatedAtDisplay" readonly style="background-color:#f1f5f9; color:#64748b;">
                        </div>
                    </div>

                    <div class="action-bar">
                        <button type="button" class="btn btn-danger" onclick="deleteMemo()">削除する</button>
                        <button type="submit" class="btn btn-primary">保存する</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script>
    // 状態管理
    let currentMainTab = 'self';
    let currentSubCategory = '';
    let currentCompanySubTab = 'マイページ情報';
    let activeMemoId = null;
    let draggedMemoId = null;

    // 初期の空データ構造
    let data = {
        industries: [],
        companies: [],
        trashIndustries: [],
        trashCompanies: [],
        memos: []
    };

    window.onload = function() {
        const stored = localStorage.getItem('shukatsu_memo_data');
        if (stored) {
            data = JSON.parse(stored);
            if (!data.trashIndustries) data.trashIndustries = [];
            if (!data.trashCompanies) data.trashCompanies = [];
        }
        switchMainTab('self');
    };

    function saveToStorage() {
        localStorage.setItem('shukatsu_memo_data', JSON.stringify(data));
    }

    /* 🛡️ バックアップ（エクスポート）機能 */
    function exportData() {
        if (data.memos.length === 0 && data.industries.length === 0 && data.companies.length === 0) {
            alert('保存するデータがまだありません。');
            return;
        }
        const jsonString = JSON.stringify(data, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        
        a.href = url;
        a.download = `shukatsu_memo_backup_${dateStr}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /* 🛡️ 復元（インポート）機能 */
    function triggerImport() {
        document.getElementById('importFileInput').click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!confirm('バックアップファイルを読み込みますか？\n※現在ブラウザに表示されている内容はすべて上書きされます。')) {
            event.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData && Array.isArray(importedData.memos)) {
                    data = importedData;
                    saveToStorage();
                    switchMainTab('self');
                    alert('データの復元が完了しました！');
                } else {
                    alert('無効なファイル形式です。正しいバックアップファイルを選んでください。');
                }
            } catch (err) {
                alert('ファイルの読み込みに失敗しました。');
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    // 大分類タブ切り替え
    function switchMainTab(tab) {
        currentMainTab = tab;
        document.querySelectorAll('.main-tab-btn').forEach(b => b.classList.remove('active'));
        
        const targetBtn = event?.target?.classList.contains('main-tab-btn') ? event.target : document.querySelector(`[onclick="switchMainTab('${tab}')"]`);
        if(targetBtn) targetBtn.classList.add('active');

        const subSection = document.getElementById('subCategorySection');
        const companyTabs = document.getElementById('companySubTabs');

        if (tab === 'self') {
            subSection.style.display = 'none';
            companyTabs.style.display = 'none';
            currentSubCategory = '';
        } else if (tab === 'industry') {
            subSection.style.display = 'block';
            companyTabs.style.display = 'none';
            document.getElementById('subCategoryTitle').textContent = '業界の種類';
            renderSubCategories(data.industries);
        } else if (tab === 'company') {
            subSection.style.display = 'block';
            companyTabs.style.display = 'flex';
            document.getElementById('subCategoryTitle').textContent = '企業名一覧';
            renderSubCategories(data.companies);
        }
        updatePathDisplay();
        closeEditor();
        renderMemoList();
        renderTrashList();
    }

    function renderSubCategories(list) {
        const subList = document.getElementById('subList');
        subList.innerHTML = '';
        
        if (list.length > 0 && !list.includes(currentSubCategory)) {
            currentSubCategory = list[0];
        } else if (list.length === 0) {
            currentSubCategory = '';
        }

        list.forEach(item => {
            const row = document.createElement('div');
            row.className = `sub-item-row ${item === currentSubCategory ? 'active' : ''}`;
            
            const btn = document.createElement('button');
            btn.className = `sub-item-btn ${item === currentSubCategory ? 'active' : ''}`;
            btn.textContent = item;
            btn.onclick = () => {
                currentSubCategory = item;
                document.querySelectorAll('.sub-item-row').forEach(r => r.classList.remove('active'));
                document.querySelectorAll('.sub-item-btn').forEach(b => b.classList.remove('active'));
                row.classList.add('active');
                btn.classList.add('active');
                updatePathDisplay();
                closeEditor();
                renderMemoList();
            };
            
            const delBtn = document.createElement('button');
            delBtn.className = 'sub-delete-btn';
            delBtn.innerHTML = '×';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteSubCategory(item);
            };

            row.appendChild(btn);
            row.appendChild(delBtn);
            subList.appendChild(row);
        });
        updatePathDisplay();
    }

    function deleteSubCategory(name) {
        if (!confirm(`「${name}」を削除してもよろしいですか？\n※この項目内のメモは一時的に非表示になります（復元で再び表示されます）。`)) return;

        if (currentMainTab === 'industry') {
            data.industries = data.industries.filter(i => i !== name);
            if (!data.trashIndustries.includes(name)) data.trashIndustries.push(name);
            if (currentSubCategory === name) currentSubCategory = data.industries[0] || '';
            renderSubCategories(data.industries);
        } else if (currentMainTab === 'company') {
            data.companies = data.companies.filter(c => c !== name);
            if (!data.trashCompanies.includes(name)) data.trashCompanies.push(name);
            if (currentSubCategory === name) currentSubCategory = data.companies[0] || '';
            renderSubCategories(data.companies);
        }
        saveToStorage();
        closeEditor();
        renderMemoList();
        renderTrashList();
    }

    function renderTrashList() {
        const trashSection = document.getElementById('trashSection');
        trashSection.innerHTML = '';
        const currentTrash = currentMainTab === 'industry' ? data.trashIndustries : data.trashCompanies;

        if (!currentTrash || currentTrash.length === 0) {
            trashSection.style.display = 'none';
            return;
        }

        trashSection.style.display = 'block';
        const title = document.createElement('div');
        title.className = 'sub-category-title';
        title.style.color = '#f87171';
        title.textContent = '🗑️ 削除済み (クリックで復元)';
        trashSection.appendChild(title);

        currentTrash.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'trash-item-btn';
            btn.textContent = `↩ ${item}`;
            btn.onclick = () => restoreSubCategory(item);
            trashSection.appendChild(btn);
        });
    }

    function restoreSubCategory(name) {
        if (currentMainTab === 'industry') {
            data.trashIndustries = data.trashIndustries.filter(i => i !== name);
            if (!data.industries.includes(name)) data.industries.push(name);
            currentSubCategory = name;
            renderSubCategories(data.industries);
        } else if (currentMainTab === 'company') {
            data.trashCompanies = data.trashCompanies.filter(c => c !== name);
            if (!data.companies.includes(name)) data.companies.push(name);
            currentSubCategory = name;
            renderSubCategories(data.companies);
        }
        saveToStorage();
        renderMemoList();
        renderTrashList();
    }

    function addSubCategory() {
        const input = document.getElementById('newSubInput');
        const val = input.value.trim();
        if (!val) return;

        if (currentMainTab === 'industry') {
            if(!data.industries.includes(val)) data.industries.push(val);
            currentSubCategory = val;
            renderSubCategories(data.industries);
        } else {
            if(!data.companies.includes(val)) data.companies.push(val);
            currentSubCategory = val;
            renderSubCategories(data.companies);
        }
        input.value = '';
        saveToStorage();
        renderMemoList();
    }

    function switchCompanySubTab(subTab) {
        currentCompanySubTab = subTab;
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        updatePathDisplay();
        closeEditor();
        renderMemoList();
    }

    function updatePathDisplay() {
        let path = '';
        if (currentMainTab === 'self') path = '自己分析';
        if (currentMainTab === 'industry') path = `業界研究 ＞ ${currentSubCategory || '(未選択)'}`;
        if (currentMainTab === 'company') path = `企業情報 ＞ ${currentSubCategory || '(未選択)'} ＞ ${currentCompanySubTab}`;
        document.getElementById('currentPath').textContent = path;
    }

    function renderMemoList() {
        const listEl = document.getElementById('memoList');
        listEl.innerHTML = '';

        const filtered = data.memos.filter(m => {
            if (m.mainCategory !== currentMainTab) return false;
            if (currentMainTab === 'industry' && m.subCategory !== currentSubCategory) return false;
            if (currentMainTab === 'company' && (m.subCategory !== currentSubCategory || m.companySub !== currentCompanySubTab)) return false;
            return true;
        });

        filtered.forEach(memo => {
            const card = document.createElement('div');
            card.className = `memo-card ${memo.id === activeMemoId ? 'active' : ''}`;
            card.setAttribute('draggable', 'true');
            
            card.ondragstart = () => handleDragStart(memo.id);
            card.ondragover = (e) => handleDragOver(e);
            card.ondrop = () => handleDrop(memo.id);
            card.ondragend = () => handleDragEnd();
            
            card.onclick = () => {
                if (card.classList.contains('dragging')) return;
                openMemo(memo.id);
            };

            card.innerHTML = `
                <div class="memo-card-title">${escapeHtml(memo.title)}</div>
                <div class="memo-card-date">更新: ${memo.updatedAt}</div>
            `;
            listEl.appendChild(card);
        });
    }

    /* 並び替え制御 */
    function handleDragStart(id) {
        draggedMemoId = id;
        event.target.classList.add('dragging');
        event.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) { e.preventDefault(); }

    function handleDrop(targetId) {
        event.preventDefault();
        if (draggedMemoId === targetId) return;

        const filteredMemos = data.memos.filter(m => {
            if (m.mainCategory !== currentMainTab) return false;
            if (currentMainTab === 'industry' && m.subCategory !== currentSubCategory) return false;
            if (currentMainTab === 'company' && (m.subCategory !== currentSubCategory || m.companySub !== currentCompanySubTab)) return false;
            return true;
        });

        const otherMemos = data.memos.filter(m => !filteredMemos.includes(m));
        const draggedIndex = filteredMemos.findIndex(m => m.id === draggedMemoId);
        const targetIndex = filteredMemos.findIndex(m => m.id === targetId);

        if (draggedIndex !== -1 && targetIndex !== -1) {
            const [draggedItem] = filteredMemos.splice(draggedIndex, 1);
            filteredMemos.splice(targetIndex, 0, draggedItem);
        }

        data.memos = [...otherMemos, ...filteredMemos];
        saveToStorage();
        renderMemoList();
    }

    function handleDragEnd() {
        document.querySelectorAll('.memo-card').forEach(c => c.classList.remove('dragging'));
        draggedMemoId = null;
    }

    function closeEditor() {
        activeMemoId = null;
        document.getElementById('memoForm').style.display = 'none';
        document.getElementById('editorEmptyState').style.display = 'block';
    }

    function createNewMemo() {
        if ((currentMainTab === 'industry' || currentMainTab === 'company') && !currentSubCategory) {
            alert('先に左下のサイドバーから分類を追加・選択してください。');
            return;
        }
        
        activeMemoId = 'new-' + Date.now();
        document.getElementById('editorEmptyState').style.display = 'none';
        const form = document.getElementById('memoForm');
        form.style.display = 'block';
        form.reset();

        document.getElementById('createdAtDisplay').value = '-';
        document.getElementById('updatedAtDisplay').value = '-';
        document.getElementById('imagePreviewArea').style.display = 'none';
        document.getElementById('previewImg').src = '';
        document.getElementById('memoTitle').focus();
        
        const scrollEl = document.getElementById('memoList');
        setTimeout(() => { scrollEl.scrollTop = scrollEl.scrollHeight; }, 50);
    }

    function openMemo(id) {
        activeMemoId = id;
        renderMemoList();
        
        const memo = data.memos.find(m => m.id === id);
        if (!memo) return;

        document.getElementById('editorEmptyState').style.display = 'none';
        document.getElementById('memoForm').style.display = 'block';

        document.getElementById('memoTitle').value = memo.title;
        document.getElementById('memoContent').value = memo.content;
        document.getElementById('createdAtDisplay').value = memo.createdAt;
        document.getElementById('updatedAtDisplay').value = memo.updatedAt;

        const previewArea = document.getElementById('imagePreviewArea');
        const previewImg = document.getElementById('previewImg');
        const slider = document.getElementById('imageSizeSlider');
        const sizeDisplay = document.getElementById('sizeDisplay');

        if (memo.imageData) {
            previewArea.style.display = 'block';
            previewImg.src = memo.imageData;
            previewImg.style.width = memo.imageWidth + 'px';
            slider.value = memo.imageWidth;
            sizeDisplay.textContent = memo.imageWidth + 'px';
        } else {
            previewArea.style.display = 'none';
            previewImg.src = '';
        }
    }

    function saveMemo(e) {
        e.preventDefault();
        const title = document.getElementById('memoTitle').value.trim();
        const content = document.getElementById('memoContent').value;
        const previewImg = document.getElementById('previewImg');
        const slider = document.getElementById('imageSizeSlider');
        const nowStr = new Date().toLocaleString('ja-JP');

        let memo = data.memos.find(m => m.id === activeMemoId);

        if (memo) {
            memo.title = title;
            memo.content = content;
            memo.imageData = previewImg.src || '';
            memo.imageWidth = slider.value;
            memo.updatedAt = nowStr;
        } else {
            memo = {
                id: activeMemoId,
                mainCategory: currentMainTab,
                subCategory: currentSubCategory,
                companySub: currentMainTab === 'company' ? currentCompanySubTab : '',
                title: title,
                content: content,
                imageData: previewImg.src || '',
                imageWidth: slider.value,
                createdAt: nowStr,
                updatedAt: nowStr
            };
            data.memos.push(memo);
        }

        saveToStorage();
        renderMemoList();
        openMemo(memo.id);
        alert('保存しました。');
    }

    function deleteMemo() {
        if (!confirm('このメモを削除してもよろしいですか？')) return;
        data.memos = data.memos.filter(m => m.id !== activeMemoId);
        saveToStorage();
        closeEditor();
        renderMemoList();
    }

    function handleImageUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const previewArea = document.getElementById('imagePreviewArea');
            const previewImg = document.getElementById('previewImg');
            
            previewArea.style.display = 'block';
            previewImg.src = event.target.result;
            previewImg.style.width = '300px'; 
            document.getElementById('imageSizeSlider').value = 300;
            document.getElementById('sizeDisplay').textContent = '300px';
        };
        reader.readAsDataURL(file);
    }

    function resizeImage(width) {
        const previewImg = document.getElementById('previewImg');
        previewImg.style.width = width + 'px';
        document.getElementById('sizeDisplay').textContent = width + 'px';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
